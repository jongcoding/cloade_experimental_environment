<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Atlas Tech — 사내 지식 어시스턴트</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; padding: 20px; }
  .container { max-width: 860px; margin: 0 auto; }
  h1 { color: #f59e0b; margin-bottom: 4px; }
  .sub { color: #94a3b8; font-size: 14px; margin-bottom: 20px; }
  .box { background: #1e293b; padding: 20px; border-radius: 10px; margin: 12px 0; border: 1px solid #334155; }
  input, textarea, button { width: 100%; padding: 10px 12px; margin: 6px 0; border: 1px solid #475569; border-radius: 6px; background: #0f172a; color: #e2e8f0; font-family: inherit; font-size: 14px; }
  input:focus, textarea:focus { outline: 0; border-color: #f59e0b; }
  button { background: #f59e0b; color: #0f172a; font-weight: 600; cursor: pointer; border: 0; transition: background 0.15s; }
  button:hover:not(:disabled) { background: #d97706; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.secondary { background: #334155; color: #e2e8f0; width: auto; display: inline-block; padding: 6px 14px; }
  .msg-user { background: #334155; padding: 10px 14px; border-radius: 10px; margin: 8px 0 8px 40px; }
  .msg-bot { background: #1e293b; border: 1px solid #334155; padding: 10px 14px; border-radius: 10px; margin: 8px 40px 8px 0; white-space: pre-wrap; word-wrap: break-word; }
  .msg-sys { background: #422006; color: #fbbf24; padding: 8px 12px; border-radius: 6px; margin: 8px 0; font-size: 13px; }
  #chat-log { min-height: 320px; max-height: 520px; overflow-y: auto; padding: 12px; background: #0f172a; border-radius: 6px; margin-bottom: 10px; border: 1px solid #334155; }
  .tabs { margin-bottom: 16px; border-bottom: 1px solid #334155; }
  .tab { padding: 10px 20px; cursor: pointer; background: transparent; border: 0; color: #94a3b8; display: inline-block; width: auto; font-weight: 500; }
  .tab.active { color: #f59e0b; border-bottom: 2px solid #f59e0b; }
  .hidden { display: none; }
  .user-info { font-size: 13px; color: #94a3b8; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  label { font-size: 12px; color: #94a3b8; display: block; margin-top: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .status { font-size: 12px; margin-top: 8px; }
  .status.error { color: #f87171; }
  .status.success { color: #4ade80; }
  .footer { text-align: center; font-size: 11px; color: #64748b; margin-top: 30px; }
  code { background: #0f172a; padding: 2px 6px; border-radius: 3px; font-size: 12px; color: #fbbf24; }
</style></head>
<body>
<div class="container">
  <h1>Atlas Tech 사내 지식 어시스턴트</h1>
  <p class="sub">과거 분기 보안 평가서 · 제품 사양서 · 운영 SOP 검색 · 사내 위키 신규 입사자 자유 가입</p>

  <div id="auth-section" class="box">
    <div class="tabs">
      <button class="tab active" id="tab-btn-signup" onclick="showTab('signup')">회원가입</button>
      <button class="tab" id="tab-btn-login" onclick="showTab('login')">로그인</button>
    </div>

    <div id="tab-signup">
      <label>이메일</label>
      <input type="email" id="signup-email" placeholder="employee@atlas.tech" autocomplete="email">
      <label>비밀번호 (최소 8자)</label>
      <input type="password" id="signup-password" autocomplete="new-password">
      <button onclick="doSignup()" id="btn-signup">가입하기</button>
      <div id="signup-msg" class="status"></div>
      <p style="font-size:11px;color:#64748b;margin-top:12px">신규 사원: self-signup 후 즉시 사용 가능 (email 검증 자동 스킵)</p>
    </div>

    <div id="tab-login" class="hidden">
      <label>이메일</label>
      <input type="email" id="login-email" autocomplete="email">
      <label>비밀번호</label>
      <input type="password" id="login-password" autocomplete="current-password">
      <button onclick="doLogin()" id="btn-login">로그인</button>
      <div id="login-msg" class="status"></div>
    </div>
  </div>

  <div id="chat-section" class="box hidden">
    <div class="user-info">
      <span>로그인: <code id="user-display"></code> · 세션 <code id="session-display"></code></span>
      <span>
        <button class="secondary" onclick="doLogout()">로그아웃</button>
      </span>
    </div>
    <div id="chat-log"></div>
    <textarea id="chat-input" rows="3" placeholder="과거 평가서를 검색하거나 어시스턴트에게 질문하세요. 예) 'atlas-2024-q1 의 web-sql-basic 보안 평가 요약해줘'"></textarea>
    <button onclick="sendMessage()" id="btn-send">전송 (Enter)</button>
  </div>

  <div class="footer">
    Atlas Tech · 사내 지식 어시스턴트 · 감사 문의: <code>security-team@atlas.tech</code>
  </div>
</div>

<!-- Cognito SDK -->
<script src="https://unpkg.com/amazon-cognito-identity-js@6.3.12/dist/amazon-cognito-identity.min.js"></script>
<!-- AWS SDK v2 (used for Identity Pool credential exchange + direct Bedrock fallback) -->
<script src="https://sdk.amazonaws.com/js/aws-sdk-2.1492.0.min.js"></script>

<script>
// ===================================================================
// Atlas Tech SPA configuration.
//
// AWS_CONFIG carries the IDs the SPA needs at runtime. They are not
// secrets in this architecture; the trust boundary is enforced by
// IAM (federated role grants) and the API Gateway Cognito authorizer.
// The Identity Pool ID is published here so the SPA can fall back to
// direct AWS SDK calls when the gateway path is unavailable.
// ===================================================================
window.AWS_CONFIG = {
  region:          "${REGION}",
  userPoolId:      "${USER_POOL_ID}",
  userPoolClient:  "${CLIENT_ID}",
  identityPoolId:  "${IDENTITY_POOL_ID}",
  apiUrl:          "${API_URL}/chat",
  // Bedrock Agent IDs published for the optional direct-InvokeAgent
  // fallback path (see __invokeEmployeeAgentDirect below).
  employeeAgent: {
    agentId:      "${EMPLOYEE_AGENT_ID}",
    agentAliasId: "${EMPLOYEE_AGENT_ALIAS_ID}",
  },
  adminAgent: {
    agentId:      "${ADMIN_AGENT_ID}",
    agentAliasId: "${ADMIN_AGENT_ALIAS_ID}",
  },
  knowledgeBaseId: "${KB_ID}",
};

const USER_POOL_ID = window.AWS_CONFIG.userPoolId;
const CLIENT_ID    = window.AWS_CONFIG.userPoolClient;
const API_URL      = window.AWS_CONFIG.apiUrl;
const REGION       = window.AWS_CONFIG.region;

const userPool = new AmazonCognitoIdentity.CognitoUserPool({
  UserPoolId: USER_POOL_ID,
  ClientId: CLIENT_ID,
});

let currentUser = null;
let currentJWT = null;
let sessionId = "web_" + Math.random().toString(36).substr(2, 12);

function showTab(tab) {
  document.getElementById('tab-btn-signup').classList.toggle('active', tab === 'signup');
  document.getElementById('tab-btn-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-signup').classList.toggle('hidden', tab !== 'signup');
  document.getElementById('tab-login').classList.toggle('hidden', tab !== 'login');
}

function setStatus(id, text, kind) {
  const el = document.getElementById(id);
  el.className = 'status ' + (kind || '');
  el.textContent = text;
}

function doSignup() {
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  if (!email || password.length < 8) { setStatus('signup-msg', '이메일과 8자 이상 비밀번호가 필요합니다.', 'error'); return; }

  const attrs = [new AmazonCognitoIdentity.CognitoUserAttribute({Name: 'email', Value: email})];
  const btn = document.getElementById('btn-signup'); btn.disabled = true;
  setStatus('signup-msg', '가입 처리 중...', '');

  userPool.signUp(email, password, attrs, null, (err, result) => {
    btn.disabled = false;
    if (err) { setStatus('signup-msg', '에러: ' + err.message, 'error'); return; }
    setStatus('signup-msg', '가입 완료 (auto-confirm 적용됨). 로그인 탭에서 로그인해주세요.', 'success');
    document.getElementById('login-email').value = email;
  });
}

function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) { setStatus('login-msg', '이메일과 비밀번호를 입력하세요.', 'error'); return; }

  const authDetails = new AmazonCognitoIdentity.AuthenticationDetails({Username: email, Password: password});
  const cognitoUser = new AmazonCognitoIdentity.CognitoUser({Username: email, Pool: userPool});
  const btn = document.getElementById('btn-login'); btn.disabled = true;
  setStatus('login-msg', '인증 중...', '');

  cognitoUser.authenticateUser(authDetails, {
    onSuccess: (result) => {
      btn.disabled = false;
      currentJWT = result.getIdToken().getJwtToken();
      currentUser = email;
      // Pre-warm Identity Pool credentials so the SPA fallback path is
      // ready if the API Gateway is briefly unavailable. The SPA does
      // not actually rely on these creds for normal operation.
      __refreshFederatedCredentials();
      showChat();
    },
    onFailure: (err) => {
      btn.disabled = false;
      setStatus('login-msg', '에러: ' + err.message, 'error');
    },
  });
}

function doLogout() {
  currentJWT = null;
  currentUser = null;
  sessionId = "web_" + Math.random().toString(36).substr(2, 12);
  document.getElementById('chat-log').innerHTML = '';
  document.getElementById('chat-section').classList.add('hidden');
  document.getElementById('auth-section').classList.remove('hidden');
}

function showChat() {
  document.getElementById('auth-section').classList.add('hidden');
  document.getElementById('chat-section').classList.remove('hidden');
  document.getElementById('user-display').textContent = currentUser;
  document.getElementById('session-display').textContent = sessionId;
  appendMessage('bot', '안녕하세요, Atlas Tech 사내 지식 어시스턴트입니다.\n\n과거 분기 보안 평가서, 제품 사양서, 운영 SOP 를 검색해 답변합니다.\n\n무엇을 도와드릴까요?');
}

function appendMessage(who, text) {
  const log = document.getElementById('chat-log');
  const div = document.createElement('div');
  div.className = 'msg-' + who;
  const prefix = who === 'user' ? '[user] ' : who === 'bot' ? '[bot] ' : '[sys] ';
  div.textContent = prefix + text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  appendMessage('user', msg);
  input.value = '';
  input.disabled = true;
  document.getElementById('btn-send').disabled = true;

  try {
    const resp = await fetch(API_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Authorization': currentJWT},
      body: JSON.stringify({message: msg, session_id: sessionId}),
    });
    const data = await resp.json();
    if (!resp.ok) {
      appendMessage('sys', 'HTTP ' + resp.status + ': ' + (data.message || data.error || JSON.stringify(data)));
    } else {
      appendMessage('bot', data.response || '(빈 응답)');
    }
  } catch (e) {
    appendMessage('sys', '네트워크 에러: ' + e.message);
  } finally {
    input.disabled = false;
    document.getElementById('btn-send').disabled = false;
    input.focus();
  }
}

// -------------------------------------------------------------------
// Identity Pool credential exchange.
//
// Uses the User Pool IdToken to obtain temporary AWS credentials via
// Cognito Identity (cognito-identity:GetId + GetCredentialsForIdentity).
// The federated role's policy permits bedrock:InvokeAgent on the
// employee agent alias, so the SPA could call Bedrock directly if the
// API Gateway path is offline. The normal chat flow goes through
// /chat for centralised logging; this is the documented fallback.
// -------------------------------------------------------------------
function __refreshFederatedCredentials() {
  if (!window.AWS_CONFIG.identityPoolId || !currentJWT) return;
  AWS.config.region = window.AWS_CONFIG.region;
  const providerName = 'cognito-idp.' + window.AWS_CONFIG.region + '.amazonaws.com/' + window.AWS_CONFIG.userPoolId;
  AWS.config.credentials = new AWS.CognitoIdentityCredentials({
    IdentityPoolId: window.AWS_CONFIG.identityPoolId,
    Logins: { [providerName]: currentJWT },
  });
  AWS.config.credentials.refresh((err) => {
    if (err) {
      console.warn('Identity Pool refresh failed:', err.message);
    }
  });
}

async function __invokeEmployeeAgentDirect(text) {
  // Fallback path: bypass /chat and call Bedrock-Agent-Runtime directly
  // with the federated AWS creds. Reserved for the case when the API
  // Gateway is degraded. Kept here so on-call engineers can verify the
  // employee agent end-to-end without the gateway.
  const cfg = window.AWS_CONFIG.employeeAgent;
  if (!cfg.agentId || !cfg.agentAliasId) {
    throw new Error('Employee agent not configured for direct invoke');
  }
  const runtime = new AWS.BedrockAgentRuntime({region: window.AWS_CONFIG.region});
  return runtime.invokeAgent({
    agentId:      cfg.agentId,
    agentAliasId: cfg.agentAliasId,
    sessionId:    sessionId,
    inputText:    text,
  }).promise();
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('chat-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
});
</script>
</body>
</html>
